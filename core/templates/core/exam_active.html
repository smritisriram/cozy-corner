{% extends 'base.html' %}
{% block title %}Practice Exam{% endblock %}
{% block content %}
<div class="view-header">
  <a href="{% url 'core:exams' %}" class="btn-back">← Back</a>
  <h2>Practice Exam</h2>
</div>
<div class="exam-header">
  <span class="exam-timer" id="exam-timer">{{ request.GET.duration|default:10 }}:00</span>
  <span class="exam-subject-label" id="exam-subject-label">{{ request.GET.subject|default:"math"|title }}</span>
</div>
<div class="exam-content">
  <div class="exam-question" id="exam-question"></div>
  <div class="exam-answers" id="exam-answers"></div>
  <div class="exam-nav">
    <button class="btn-soft" id="exam-prev">Previous</button>
    <button class="btn-soft btn-primary" id="exam-next">Next</button>
  </div>
</div>
{% load static %}
<script>
  window.EXAM_SUBJECT = "{{ request.GET.subject|default:'math' }}";
  window.EXAM_DURATION = parseInt("{{ request.GET.duration|default:10 }}", 10);
  window.EXAM_COMPLETE_URL = "{% url 'core:exam_complete' %}";
  window.CSRF_TOKEN = "{{ csrf_token }}";
  window.EXAM_PRACTICE_MODE = {% if request.GET.mode == 'practice' %}true{% else %}false{% endif %};
</script>
<script src="{% static 'js/exam.js' %}"></script>
{% endblock %}
