{% extends 'base.html' %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1>Welcome to Cozy Corner</h1>
    <p>Create your account — no email required.</p>
    <form method="post" class="auth-form">
      {% csrf_token %}
      {% for field in form %}
      <label>
        <span>{{ field.label }}</span>
        {{ field }}
        {% if field.errors %}<span class="error">{{ field.errors.0 }}</span>{% endif %}
      </label>
      {% endfor %}
      <button type="submit" class="btn-soft btn-primary">Get Started</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="{% url 'core:login' %}">Log in</a></p>
  </div>
</div>
<style>
.auth-page { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.auth-card { background: white; padding: 2rem; border-radius: 24px; box-shadow: 0 8px 40px rgba(92,85,73,0.15); max-width: 400px; width: 100%; }
.auth-card h1 { color: var(--sage-dark); margin-bottom: 0.5rem; }
.auth-card p { color: var(--text); margin-bottom: 1.5rem; }
.auth-form label { display: flex; flex-direction: column; gap: 0.25rem; margin-bottom: 1rem; }
.auth-form input { padding: 0.6rem 1rem; border-radius: 10px; border: 1px solid var(--cream-dark); font-family: inherit; }
.auth-form .error { color: #c44; font-size: 0.85rem; }
.auth-form button { width: 100%; margin-top: 0.5rem; }
.auth-footer { margin-top: 1rem; font-size: 0.9rem; color: var(--text-light); }
.auth-footer a { color: var(--sage); }
</style>
{% endblock %}
